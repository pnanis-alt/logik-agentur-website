<?xml version="1.0" encoding="UTF-8"?>
<!--
  Logik-Agentur Logo v1.0
  Token-konform mit docs/design-tokens.md v1.0:
    - Akzent: Indigo #4F46E5 (Solid, kein Gradient)
    - Wortmarke: Inter
    - Subline: ink-muted #52525B
  Skalierbar (SVG), für Header (40-60px), Hero (96-160px) und Favicon (geclippt aufs Monogramm).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 480 240"
     width="480" height="240"
     role="img" aria-label="Logik-Agentur — KI für Kommunikation und Automation">

  <!-- =========================================================================
       Monogramm "LA" — geteilte Linien, Indigo Solid
       L: vertikale Linie + Basis
       A: zwei Diagonalen mit Querstrich, links unten an L-Basis verbunden
       ========================================================================= -->
  <g stroke="#4F46E5" stroke-width="4" stroke-linecap="square" fill="none">
    <!-- L -->
    <line x1="180" y1="50"  x2="180" y2="130" />
    <line x1="180" y1="130" x2="225" y2="130" />

    <!-- A — linke Diagonale endet exakt am Endpunkt der L-Basis (225,130) -->
    <line x1="225" y1="130" x2="265" y2="50"  />
    <!-- A — rechte Diagonale -->
    <line x1="265" y1="50"  x2="305" y2="130" />
    <!-- A — Querstrich (auf 75% der Höhe, klassische A-Proportion) -->
    <line x1="240" y1="100" x2="290" y2="100" />
  </g>

  <!-- =========================================================================
       Wortmarke "LOGIK AGENTUR"
       Inter Light/Regular, breit getrackt, sehr ruhig
       ========================================================================= -->
  <text x="240" y="180"
        text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="28"
        font-weight="400"
        letter-spacing="6"
        fill="#18181B">LOGIK AGENTUR</text>

  <!-- =========================================================================
       Subline — Domäne, Deployer-konform
       (Provider-Wording vermieden: keine "unsere KI", kein "Voice Agents" als
       Eigenprodukt-Versprechen)
       ========================================================================= -->
  <text x="240" y="208"
        text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="2.5"
        fill="#52525B">KI FÜR KOMMUNIKATION UND AUTOMATION</text>

</svg>
